<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Ava Soleil</title>
<meta name="description" content="Wellness, biohacking, and longevity articles by Ava Soleil.">
<link rel="stylesheet" href="css/style.css">
<style>
  .blog-hero {
    padding: 140px 80px 80px;
    background: var(--white);
    border-bottom: 1px solid rgba(200,160,130,0.12);
  }
  .blog-hero-inner { max-width: 640px; }

  /* FILTER TABS */
  .filter-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 32px 80px;
    background: var(--white);
    border-bottom: 1px solid rgba(200,160,130,0.1);
    position: sticky; top: 62px; z-index: 50;
    backdrop-filter: blur(10px);
  }
  .filter-btn {
    padding: 8px 20px; border-radius: 30px; border: 1px solid var(--blush);
    background: transparent; cursor: pointer; font-family: 'Jost', sans-serif;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--brown-mid); transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--rose); color: var(--white); border-color: var(--rose);
  }

  /* FEATURED POST */
  .featured-wrap { padding: 60px 80px 0; background: var(--cream); }
  .featured-card {
    display: grid; grid-template-columns: 1.1fr 1fr;
    background: var(--white); border-radius: 24px; overflow: hidden;
    text-decoration: none; color: inherit;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .featured-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(46,27,14,0.1); }
  .featured-img {
    min-height: 380px; display: flex; align-items: center; justify-content: center;
    font-size: 90px; position: relative;
  }
  .featured-badge {
    position: absolute; top: 20px; left: 20px;
    background: var(--rose); color: var(--white);
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 16px; border-radius: 20px; font-weight: 500;
  }
  .featured-body { padding: 50px 50px 50px 44px; display: flex; flex-direction: column; justify-content: center; }
  .featured-body .card-title { font-size: 30px; margin-bottom: 14px; }
  .featured-body .card-excerpt { font-size: 16px; margin-bottom: 24px; }

  /* GRID */
  .posts-wrap { padding: 50px 80px 100px; background: var(--cream); }
  .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .no-posts { padding: 60px; text-align: center; color: var(--brown-light); font-size: 16px; }

  @media (max-width: 900px) {
    .blog-hero, .filter-bar, .featured-wrap, .posts-wrap { padding-left: 24px; padding-right: 24px; }
    .featured-card, .posts-grid { grid-template-columns: 1fr; }
    .featured-img { min-height: 200px; }
  }
</style>
</head>
<body>
<div id="nav-root"></div>

<section class="blog-hero">
  <div class="blog-hero-inner">
    <div class="section-eyebrow">The Blog</div>
    <h1 class="section-title">Wellness, <em>researched</em><br>and distilled for you</h1>
  </div>
</section>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-cat="All" onclick="filterPosts('All', this)">All</button>
</div>

<div class="featured-wrap" id="featured-wrap" style="display:none"></div>

<div class="posts-wrap">
  <div class="posts-grid" id="posts-grid">
    <div style="padding:40px;color:var(--brown-light);font-size:14px;grid-column:1/-1;">Loading posts...</div>
  </div>
</div>

<div id="email-root"></div>
<div id="footer-root"></div>

<script src="js/app.js"></script>
<script>
  document.getElementById('nav-root').innerHTML   = renderNav('Blog');
  document.getElementById('email-root').innerHTML = renderEmailSection();
  document.getElementById('footer-root').innerHTML= renderFooter();

  let allPosts = [];
  let currentCat = 'All';

  // Check URL param for category filter
  const urlCat = new URLSearchParams(window.location.search).get('cat');
  if (urlCat) currentCat = decodeURIComponent(urlCat);

  loadPosts().then(posts => {
    allPosts = posts;

    // Build filter buttons from unique categories
    const cats = ['All', ...new Set(posts.map(p => p.category))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = cats.map(c =>
      `<button class="filter-btn ${c === currentCat ? 'active' : ''}" data-cat="${c}" onclick="filterPosts('${c}', this)">${c}</button>`
    ).join('');

    renderPosts(currentCat);
  });

  function filterPosts(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts(cat);
  }

  function renderPosts(cat) {
    const filtered = cat === 'All' ? allPosts : allPosts.filter(p => p.category === cat);
    const featuredWrap = document.getElementById('featured-wrap');
    const grid = document.getElementById('posts-grid');

    if (filtered.length === 0) {
      featuredWrap.style.display = 'none';
      grid.innerHTML = `<div class="no-posts">No posts in this category yet — check back soon! 🌿</div>`;
      return;
    }

    // Featured = first post
    const [featured, ...rest] = filtered;
    featuredWrap.style.display = 'block';
    featuredWrap.innerHTML = `
      <a href="post.html?slug=${featured.slug}" class="featured-card">
        <div class="featured-img" style="background:${featured.gradient}">
          <span>${featured.emoji}</span>
          <span class="featured-badge">Latest</span>
        </div>
        <div class="featured-body">
          <div class="card-meta">${featured.date} · ${featured.readTime}</div>
          <div class="card-title">${featured.title}</div>
          <p class="card-excerpt">${featured.excerpt}</p>
          <span class="card-link">Read Article →</span>
        </div>
      </a>`;

    grid.innerHTML = rest.length
      ? rest.map(p => formatCard(p)).join('')
      : `<div class="no-posts" style="grid-column:1/-1">More articles coming soon ✨</div>`;
  }
</script>
</body>
</html>
